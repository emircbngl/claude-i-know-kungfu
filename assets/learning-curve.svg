<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" role="img" aria-label="Gleam benchmark: cold versus warm. pass@1 rises 0.50 to 1.00; hallucinated-symbol rate falls 0.25 to 0.00.">
  <rect width="720" height="430" fill="#0d0208"/>
  <text x="360" y="34" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#00ff41">Gleam — held-out test split: cold vs warm</text>

  <!-- y gridlines + labels (value v -> y = 330 - v*260) -->
  <g font-family="monospace" font-size="12" fill="#6f8f7c">
    <line x1="90" y1="330" x2="660" y2="330" stroke="#23351f"/>
    <line x1="90" y1="265" x2="660" y2="265" stroke="#1a2718"/>
    <line x1="90" y1="200" x2="660" y2="200" stroke="#1a2718"/>
    <line x1="90" y1="135" x2="660" y2="135" stroke="#1a2718"/>
    <line x1="90" y1="70"  x2="660" y2="70"  stroke="#1a2718"/>
    <text x="82" y="334" text-anchor="end">0.00</text>
    <text x="82" y="269" text-anchor="end">0.25</text>
    <text x="82" y="204" text-anchor="end">0.50</text>
    <text x="82" y="139" text-anchor="end">0.75</text>
    <text x="82" y="74"  text-anchor="end">1.00</text>
  </g>

  <!-- pass@1: cold 0.50 (y=200,h=130), warm 1.00 (y=70,h=260) -->
  <rect x="190" y="200" width="56" height="130" fill="#356a4d"/>
  <rect x="254" y="70"  width="56" height="260" fill="#00ff41"/>
  <g font-family="monospace" font-size="13" fill="#cdebd6" text-anchor="middle">
    <text x="218" y="192">0.50</text>
    <text x="282" y="62" fill="#00ff41" font-weight="bold">1.00</text>
  </g>

  <!-- hallucinated-symbol rate: cold 0.25 (y=265,h=65), warm 0.00 -->
  <rect x="440" y="265" width="56" height="65" fill="#356a4d"/>
  <rect x="504" y="328" width="56" height="2"  fill="#00ff41"/>
  <g font-family="monospace" font-size="13" fill="#cdebd6" text-anchor="middle">
    <text x="468" y="257">0.25</text>
    <text x="532" y="320" fill="#00ff41" font-weight="bold">0.00</text>
  </g>

  <!-- group labels -->
  <g font-family="'Courier New', monospace" font-size="14" fill="#b9f5c8" text-anchor="middle">
    <text x="250" y="356">pass@1</text>
    <text x="250" y="374" font-size="11" fill="#6f8f7c">(higher is better)</text>
    <text x="500" y="356">hallucinated-symbol rate</text>
    <text x="500" y="374" font-size="11" fill="#6f8f7c">(lower is better)</text>
  </g>

  <!-- legend -->
  <g font-family="monospace" font-size="13">
    <rect x="300" y="396" width="14" height="14" fill="#356a4d"/>
    <text x="320" y="408" fill="#cdebd6">cold (no KB)</text>
    <rect x="440" y="396" width="14" height="14" fill="#00ff41"/>
    <text x="460" y="408" fill="#cdebd6">warm (after learning)</text>
  </g>

  <text x="360" y="426" text-anchor="middle" font-family="monospace" font-size="11" fill="#4f6f5c">measured in the Docker sandbox · gleam v1.15 · --network none · real run, n=4</text>
</svg>
